<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NeighbourNet — Connect, share, and support your building community. An intergenerational community portal with dual dashboards for all ages.">
  <meta name="theme-color" content="#6C5CE7">
  <title>NeighbourNet — Your Building, Your Community</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/silver.css">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏘️</text></svg>">
</head>
<body>
  <!-- App Root -->
  <div id="app"></div>

  <!-- Scripts — Order matters: store & i18n loaded first, then components, pages, router last -->
  <script src="js/store.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/components/components.js"></script>

  <!-- Pages: Landing & Auth -->
  <script src="js/pages/landing.js"></script>
  <script src="js/pages/register.js"></script>
  <script src="js/pages/login.js"></script>

  <!-- Pages: Vibrant Dashboard -->
  <script src="js/pages/vibrant/dashboard.js"></script>
  <script src="js/pages/vibrant/credits.js"></script>
  <script src="js/pages/vibrant/marketplace.js"></script>
  <script src="js/pages/vibrant/chat.js"></script>
  <script src="js/pages/vibrant/skills.js"></script>
  <script src="js/pages/vibrant/notices.js"></script>
  <script src="js/pages/vibrant/events.js"></script>

  <!-- Pages: Silver Dashboard -->
  <script src="js/pages/silver/dashboard.js"></script>
  <script src="js/pages/silver/notices.js"></script>
  <script src="js/pages/silver/messages.js"></script>
  <script src="js/pages/silver/help.js"></script>

  <!-- Pages: Emergency -->
  <script src="js/pages/emergency.js"></script>

  <!-- App Router (must be last) -->
  <script src="js/app.js"></script>
</body>
</html>
